name: Release

on:
  workflow_run:
    workflows: ["Validate"]
    types: [completed]
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-release:
    name: Create GitHub Release
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION_IN_MANIFEST="$(jq -r '.version' custom_components/eu_power_prices/manifest.json)"
            if [[ "${TAG}" != "v${VERSION_IN_MANIFEST}" ]]; then
              echo "Tag ${TAG} does not match manifest version v${VERSION_IN_MANIFEST}."
              exit 1
            fi
          else
            VERSION_IN_MANIFEST="$(jq -r '.version' custom_components/eu_power_prices/manifest.json)"
            TAG="v${VERSION_IN_MANIFEST}"
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Resolve target commit
        id: target
        run: echo "sha=${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}" >> "${GITHUB_OUTPUT}"

      - name: Check if release already exists
        id: release_state
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.meta.outputs.tag }}';
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.setOutput('exists', 'true');
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('exists', 'false');
                return;
              }
              throw error;
            }

      - name: Skip existing release
        if: steps.release_state.outputs.exists == 'true'
        run: echo "Release for ${{ steps.meta.outputs.tag }} already exists; skipping."

      - name: Create release from tag
        if: steps.release_state.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ steps.target.outputs.sha }}
          name: EU Power Prices ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
